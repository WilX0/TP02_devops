name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: MyService

    - name: Build with Gradle
      run: ./gradlew compileJava
      working-directory: MyService

    - name: Run Tests with JaCoCo Coverage
      run: ./gradlew test jacocoTestReport
      working-directory: MyService

    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: MyService/build/reports/jacoco/

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: MyService/build/reports/tests/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./MyService/build/reports/jacoco/test/jacocoTestReport.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Display JaCoCo Coverage Summary
      if: always()
      run: |
        echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "JaCoCo coverage report generated at: build/reports/jacoco/test/html/index.html" >> $GITHUB_STEP_SUMMARY
      working-directory: MyService

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t myservice:latest -f MyService/Dockerfile MyService
